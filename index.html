<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Conferência de Cadastro — Agás &amp; Eugas</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F5F6F8;color:#1a1a1a;font-size:14px;min-height:100vh}
header{background:#fff;border-bottom:1px solid #E2E4E9;padding:14px 24px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
header svg{flex-shrink:0}
header h1{font-size:16px;font-weight:600;color:#111}
header p{font-size:12px;color:#6B7280;margin-top:1px}
.container{max-width:1100px;margin:0 auto;padding:20px 16px 48px}
.top-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.cod-box{background:#fff;border:1px solid #E2E4E9;border-radius:10px;padding:12px 14px}
.cod-box-head{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:600;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #F0F1F4}
.cod-box-head.agas{color:#1553A0}
.cod-box-head.eugas{color:#0C6B4E}
.cod-fields{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.field-wrap label{display:block;font-size:11px;color:#6B7280;margin-bottom:4px;font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.field-wrap input{width:100%;border:1px solid #E2E4E9;border-radius:7px;padding:6px 10px;font-size:13px;color:#111;background:#FAFAFA;outline:none;transition:border .15s}
.field-wrap input:focus{border-color:#6B7AFF;background:#fff}
.summary-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.sum-card{background:#fff;border:1px solid #E2E4E9;border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.sum-bar-accent{width:6px;height:36px;border-radius:4px;flex-shrink:0}
.sum-num{font-size:24px;font-weight:700;color:#111;line-height:1}
.sum-label{font-size:11px;color:#6B7280;margin-top:3px}
.prog-track{flex:1;height:5px;background:#F0F1F4;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .3s;width:0%}
.prog-fill.agas{background:#378ADD}
.prog-fill.eugas{background:#1D9E75}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.col-card{background:#fff;border:1px solid #E2E4E9;border-radius:10px;overflow:hidden}
.col-head{padding:10px 14px;display:flex;align-items:center;gap:8px}
.col-head.agas{background:#EEF4FC;border-bottom:1px solid #D5E4F5}
.col-head.eugas{background:#E8F7F1;border-bottom:1px solid #C2E8D8}
.col-head span{font-size:13px;font-weight:600}
.col-head.agas span{color:#1553A0}
.col-head.eugas span{color:#0C6B4E}
.col-head small{font-size:11px;margin-left:auto;padding:2px 8px;border-radius:20px;font-weight:500}
.col-head.agas small{background:#D5E4F5;color:#1553A0}
.col-head.eugas small{background:#C2E8D8;color:#0C6B4E}
.col-prog{height:3px;background:#F0F1F4}
.col-prog-fill{height:100%;transition:width .3s;width:0%}
.col-prog-fill.agas{background:#378ADD}
.col-prog-fill.eugas{background:#1D9E75}
.item-label{font-size:10px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;padding:5px 14px 4px;background:#FAFAFA;border-bottom:1px solid #F0F1F4}
.item-row{display:flex;gap:8px;align-items:flex-start;padding:9px 12px;border-bottom:1px solid #F5F6F8}
.item-row:last-child{border-bottom:none}
.item-info{flex:1;min-width:0}
.item-name{font-size:13px;color:#111;font-weight:500;line-height:1.3}
.item-desc{font-size:11px;color:#9CA3AF;margin-top:2px;line-height:1.3}
.venc-inp{margin-top:5px;border:1px solid #E2E4E9;border-radius:6px;padding:3px 7px;font-size:12px;color:#111;background:#FAFAFA;width:100%;max-width:140px;outline:none}
.venc-inp:focus{border-color:#6B7AFF;background:#fff}
.obs-inp{margin-top:5px;border:1px solid #E2E4E9;border-radius:6px;padding:3px 7px;font-size:11px;color:#111;background:#FAFAFA;width:100%;resize:none;min-height:26px;font-family:inherit;outline:none;line-height:1.5}
.obs-inp:focus{border-color:#6B7AFF;background:#fff}
.pills{display:flex;flex-direction:column;gap:4px;flex-shrink:0;padding-top:1px}
.pill{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;border:1px solid #E2E4E9;font-size:11px;font-weight:500;cursor:pointer;color:#6B7280;background:#fff;transition:all .15s;white-space:nowrap;line-height:1;user-select:none}
.pill:hover{border-color:#CBD0D8}
.pill.sim.on{background:#ECFDF5;color:#065F46;border-color:#A7F3D0}
.pill.nao.on{background:#FEF2F2;color:#991B1B;border-color:#FECACA}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:1px solid #E2E4E9;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-agas{background:#EEF4FC;color:#1553A0;border-color:#D5E4F5}
.btn-agas:hover{background:#D5E4F5}
.btn-eugas{background:#E8F7F1;color:#0C6B4E;border-color:#C2E8D8}
.btn-eugas:hover{background:#C2E8D8}
.btn-clear{background:#fff;color:#6B7280;border-color:#E2E4E9}
.btn-clear:hover{background:#F5F6F8}
.notes-card{background:#fff;border:1px solid #E2E4E9;border-radius:10px;overflow:hidden}
.notes-head{padding:10px 14px;background:#FAFAFA;border-bottom:1px solid #F0F1F4;display:flex;align-items:center;gap:8px}
.notes-head span{font-size:13px;font-weight:600;color:#111}
.notes-head small{font-size:11px;color:#9CA3AF;margin-left:auto}
.notes-body{padding:12px 14px}
textarea.notes-ta{width:100%;border:1px solid #E2E4E9;border-radius:8px;padding:10px 12px;font-size:13px;color:#111;background:#FAFAFA;resize:vertical;min-height:110px;font-family:inherit;line-height:1.6;outline:none;transition:border .15s}
textarea.notes-ta:focus{border-color:#6B7AFF;background:#fff}
textarea.notes-ta::placeholder{color:#C4C9D4}
.char-c{font-size:11px;color:#C4C9D4;text-align:right;margin-top:4px}
@media(max-width:640px){
  .top-row,.summary-row,.grid{grid-template-columns:1fr}
  .cod-fields{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<header>
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#6B7AFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
    <rect x="9" y="3" width="6" height="4" rx="2"/>
    <path d="m9 14 2 2 4-4"/>
  </svg>
  <div>
    <h1>Conferência de Cadastro — Cliente</h1>
    <p>Agás Gases Ltda &amp; Eugas Comércio de Gases Eireli</p>
  </div>
</header>

<div class="container">

  <div class="top-row">
    <div class="cod-box">
      <div class="cod-box-head agas">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Agás — dados do cliente
      </div>
      <div class="cod-fields">
        <div class="field-wrap"><label>Cód. cliente</label><input type="text" id="cod-agas" placeholder="Ex.: 001234"/></div>
        <div class="field-wrap"><label>Nome do cliente</label><input type="text" id="nome-agas" placeholder="Razão social / nome"/></div>
      </div>
    </div>
    <div class="cod-box">
      <div class="cod-box-head eugas">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Eugas — dados do cliente
      </div>
      <div class="cod-fields">
        <div class="field-wrap"><label>Cód. cliente</label><input type="text" id="cod-eugas" placeholder="Ex.: 005678"/></div>
        <div class="field-wrap"><label>Nome do cliente</label><input type="text" id="nome-eugas" placeholder="Razão social / nome"/></div>
      </div>
    </div>
  </div>

  <div class="summary-row">
    <div class="sum-card">
      <div class="sum-bar-accent" style="background:#378ADD"></div>
      <div><div class="sum-num" id="num-a">0/9</div><div class="sum-label">Agás — itens conferidos</div></div>
      <div class="prog-track"><div class="prog-fill agas" id="bar-a"></div></div>
    </div>
    <div class="sum-card">
      <div class="sum-bar-accent" style="background:#1D9E75"></div>
      <div><div class="sum-num" id="num-e">0/9</div><div class="sum-label">Eugas — itens conferidos</div></div>
      <div class="prog-track"><div class="prog-fill eugas" id="bar-e"></div></div>
    </div>
  </div>

  <div class="grid" id="main-grid"></div>

  <div class="btn-row">
    <button class="btn btn-agas" onclick="exportar('agas')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar Agás
    </button>
    <button class="btn btn-eugas" onclick="exportar('eugas')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar Eugas
    </button>
    <button class="btn btn-clear" onclick="limpar()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
      Limpar tudo
    </button>
  </div>

  <div class="notes-card">
    <div class="notes-head">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      <span>Anotações gerais</span>
      <small>Observações livres sobre a conferência</small>
    </div>
    <div class="notes-body">
      <textarea class="notes-ta" id="notas" placeholder="Registre aqui pendências, dúvidas, informações adicionais ou qualquer observação relevante sobre a conferência deste cliente..." oninput="updateChar()"></textarea>
      <div class="char-c" id="char-c">0 caracteres</div>
    </div>
  </div>

</div>

<script>
const ITENS = [
  {id:'vencimento', nome:'Vencimento', desc:'Prazo de vencimento preenchido', venc:true},
  {id:'tipo_envio', nome:'Tipo de envio', desc:'Deve estar configurado como E-mail'},
  {id:'tipo_cobranca', nome:'Tipo de cobrança', desc:'Carteira ou banco (bancária: 756 Agás / 748 Eugas)'},
  {id:'email_cobranca', nome:'E-mail de cobrança', desc:'Obrigatório para envio de boleto bancário'},
  {id:'bloqueio', nome:'Bloqueio — "Não permitir"', desc:'A opção "Não permitir" deve estar marcada'},
  {id:'inadimplencia', nome:'Dias de inadimplência', desc:'Deve estar configurado como 5 dias'},
  {id:'esta_bloqueado', nome:'Está bloqueado?', desc:'Se bloqueado, deve estar marcado como Sim'},
  {id:'comissao', nome:'Gerar comissão / Permite alterar', desc:'Ambos devem estar marcados como Sim'},
  {id:'email_nf', nome:'E-mail cadastrado (NF)', desc:'E-mail para envio de cópia da nota fiscal'},
];

const EMPS = ['agas','eugas'];
let estado = {};
EMPS.forEach(e => {
  estado[e] = {};
  ITENS.forEach(i => { estado[e][i.id] = {sim:false, nao:false, obs:'', venc:''} });
});

function toggle(emp, id, val){
  const s = estado[emp][id];
  if(val==='sim'){ s.sim=!s.sim; if(s.sim) s.nao=false; }
  else { s.nao=!s.nao; if(s.nao) s.sim=false; }
  renderAll(); updateProgress();
}
function setObs(emp,id,v){ estado[emp][id].obs=v; }
function setVenc(emp,id,v){ estado[emp][id].venc=v; }
function updateChar(){
  const v=document.getElementById('notas').value;
  document.getElementById('char-c').textContent=v.length+' caractere'+(v.length!==1?'s':'');
}

function renderCol(e){
  const s=estado[e];
  const done=ITENS.filter(i=>s[i.id].sim||s[i.id].nao).length;
  const pct=Math.round(done/ITENS.length*100);
  const banco=e==='agas'?'756':'748';
  const nomeEmp=e==='agas'?'Agás Gases Ltda':'Eugas Comércio de Gases';
  let h=`<div class="col-card">
    <div class="col-head ${e}">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>${nomeEmp}</span>
      <small>Banco ${banco}</small>
    </div>
    <div class="col-prog"><div class="col-prog-fill ${e}" id="cprog-${e}" style="width:${pct}%"></div></div>
    <div class="item-label">Item / Sim / Não</div>`;
  ITENS.forEach(item=>{
    const st=s[item.id];
    h+=`<div class="item-row">
      <div class="item-info">
        <div class="item-name">${item.nome}</div>
        <div class="item-desc">${item.desc}</div>
        ${item.venc&&st.sim?`<input class="venc-inp" type="text" placeholder="Ex.: dia 10" value="${st.venc}" oninput="setVenc('${e}','${item.id}',this.value)"/>`:''}
        ${(st.sim||st.nao)?`<textarea class="obs-inp" placeholder="Observação..." oninput="setObs('${e}','${item.id}',this.value)">${st.obs}</textarea>`:''}
      </div>
      <div class="pills">
        <button class="pill sim ${st.sim?'on':''}" onclick="toggle('${e}','${item.id}','sim')">✓ Sim</button>
        <button class="pill nao ${st.nao?'on':''}" onclick="toggle('${e}','${item.id}','nao')">✗ Não</button>
      </div>
    </div>`;
  });
  h+='</div>';
  return h;
}

function renderAll(){
  document.getElementById('main-grid').innerHTML=renderCol('agas')+renderCol('eugas');
}

function updateProgress(){
  EMPS.forEach(e=>{
    const done=ITENS.filter(i=>estado[e][i.id].sim||estado[e][i.id].nao).length;
    const pct=Math.round(done/ITENS.length*100);
    const suf=e==='agas'?'a':'e';
    document.getElementById('bar-'+suf).style.width=pct+'%';
    document.getElementById('num-'+suf).textContent=done+'/'+ITENS.length;
    const cp=document.getElementById('cprog-'+e);
    if(cp) cp.style.width=pct+'%';
  });
}

function limpar(){
  EMPS.forEach(e=>{ ITENS.forEach(i=>{ estado[e][i.id]={sim:false,nao:false,obs:'',venc:''} }) });
  ['cod-agas','nome-agas','cod-eugas','nome-eugas'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
  document.getElementById('notas').value='';
  document.getElementById('char-c').textContent='0 caracteres';
  renderAll(); updateProgress();
}

function exportar(e){
  const cod=document.getElementById('cod-'+e).value||'(não informado)';
  const nome=document.getElementById('nome-'+e).value||'(não informado)';
  const empresa=e==='agas'?'Agás Gases Ltda':'Eugas Comércio de Gases Eireli';
  const banco=e==='agas'?'756':'748';
  const notas=document.getElementById('notas').value;
  let linhas=[
    `CONFERÊNCIA DE CADASTRO — ${empresa.toUpperCase()}`,
    `Cód. cliente: ${cod}`,
    `Nome: ${nome}`,
    `Banco: ${banco}`,
    `Data: ${new Date().toLocaleDateString('pt-BR')}`,
    `Responsável pela conferência: `,
    `---`
  ];
  ITENS.forEach(item=>{
    const st=estado[e][item.id];
    const status=st.sim?'✓ SIM':st.nao?'✗ NÃO':'⚪ Não conferido';
    let linha=`${item.nome}: ${status}`;
    if(item.venc&&st.sim&&st.venc) linha+=` | Prazo: ${st.venc}`;
    if(st.obs) linha+=` | Obs: ${st.obs}`;
    linhas.push(linha);
  });
  if(notas.trim()){ linhas.push('---'); linhas.push('ANOTAÇÕES GERAIS:'); linhas.push(notas.trim()); }
  const blob=new Blob([linhas.join('\n')],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`checklist_${e}_${cod.replace(/\W/g,'_')}.txt`;
  a.click();
}

renderAll();
</script>
</body>
</html>
